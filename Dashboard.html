<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChitChat Dashboard</title>
    <style>
        /* CSS styles go here */
        body { font-family: sans-serif; background-color: #0b1d33; color: #00ff41; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px; background: #162b45; text-align: center; font-size: 1.5rem; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; }
        #input-area { padding: 20px; background: #162b45; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #0b1d33; border: 1px solid #00ff41; color: #00ff41; border-radius: 4px; }
        button { padding: 10px 20px; background: #00ff41; color: #0b1d33; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>ChitChat Dashboard</header>
    <div id="chat-window">
        <p>Welcome! Start chatting below...</p>
    </div>
    <div id="input-area">
        <input type="text" placeholder="Type a message...">
        <button>Send</button>
    </div>

</body>
</html>
