<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChitChat Login</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b1d33;
            margin: 0;
            color: #00ff41;
        }
        .container {
            background: #162b45;
            padding: 25px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff41;
            border-radius: 4px;
            background-color: #0b1d33;
            color: #00ff41;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #00ff41;
            color: #0b1d33;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login to ChitChat</h2>
        
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
        </form>

        <a href="dashboard.html" style="text-decoration: none;">
            <button type="button">Login</button>
        </a>
    </div>

</body>
</html>
