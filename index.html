<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINCHTECH - Portal Secure</title>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBzK4tt4gI-B8GAJVXqKpgQD6PTdtuxkbo",
        authDomain: "chat-base-35120.firebaseapp.com",
        projectId: "chat-base-35120",
        storageBucket: "chat-base-35120.firebasestorage.app",
        messagingSenderId: "132736236077",
        appId: "1:132736236077:web:d021488cc88724970ed6a4"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // System Error Logger Utility
      function logError(msg) {
          const box = document.getElementById("error-message");
          box.style.display = "block";
          box.innerText = msg;
      }

      // Tab Switcher Logic
      window.switchAuthMode = function(mode) {
          document.getElementById("error-message").style.display = "none";
          if(mode === 'phone') {
              document.getElementById("email-form-section").style.display = "none";
              document.getElementById("phone-form-section").style.display = "block";
          } else {
              document.getElementById("email-form-section").style.display = "block";
              document.getElementById("phone-form-section").style.display = "none";
          }
      }

      // Email Login Execution
      window.handleLogin = function(event) {
          event.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          
          document.getElementById("error-message").style.display = "none";

          signInWithEmailAndPassword(auth, email, password)
              .then(() => { alert("Access Granted! Welcome back."); })
              .catch((err) => { logError("Firebase Auth Error: " + err.message); });
      };

      // Phone OTP Authentication System
      window.setupPhoneAuth = function(event) {
          event.preventDefault();
          const phoneNumber = document.getElementById("phone-field").value.trim();
          document.getElementById("error-message").style.display = "none";

          if(!window.recaptchaVerifier) {
              window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-box', {
                  'size': 'invisible'
              });
          }

          signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier)
              .then((confirmationResult) => {
                  window.confirmationResult = confirmationResult;
                  document.getElementById("phone-input-row").style.display = "none";
                  document.getElementById("otp-input-row").style.display = "block";
                  alert("SMS Code dispatched successfully!");
              })
              .catch((err) => { logError("Phone Verification Blocked: " + err.message); });
      };

      window.verifyOTPCode = function(event) {
          event.preventDefault();
          const code = document.getElementById("otp-code-field").value.trim();
          
          window.confirmationResult.confirm(code)
              .then(() => { alert("Device Verified! Logging into FINCHTECH..."); })
              .catch((err) => { logError("Invalid verification code. " + err.message); });
      };
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #111827; padding: 35px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #1f2937; text-align: center; }
        .brand-logo { font-size: 2rem; font-weight: 800; background: linear-gradient(45deg, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .brand-subtitle { color: #9ca3af; font-size: 0.85rem; margin-bottom: 20px; }
        
        .toggle-menu { display: flex; gap: 10px; margin-bottom: 25px; }
        .toggle-btn { flex: 1; padding: 10px; background: #1f2937; border: 1px solid #374151; color: #9ca3af; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .toggle-btn:hover { color: white; border-color: #3b82f6; }

        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.8rem; color: #9ca3af; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: #fff; font-size: 0.95rem; }
        .input-group input:focus { outline: none; border-color: #3b82f6; }
        
        .error-box { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 12px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.85rem; margin-bottom: 20px; display: none; text-align: left; word-break: break-all; }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .signup-redirect { margin-top: 25px; font-size: 0.85rem; color: #9ca3af; }
        .signup-redirect a { color: #10b981; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-logo">FINCHTECH</div>
        <p class="brand-subtitle">Secure Access Portal</p>

        <div class="error-box" id="error-message"></div>

        <div class="toggle-menu">
            <button class="toggle-btn" onclick="switchAuthMode('email')">Email Login</button>
            <button class="toggle-btn" onclick="switchAuthMode('phone')">Phone OTP</button>
        </div>

        <div id="recaptcha-box"></div>

        <div id="email-form-section">
            <form onsubmit="handleLogin(event);">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">Sign In Securely</button>
            </form>
        </div>

        <div id="phone-form-section" style="display: none;">
            <form id="phone-input-row" onsubmit="setupPhoneAuth(event);">
                <div class="input-group">
                    <label>Phone Number (Include Country Code, e.g., +254...)</label>
                    <input type="text" id="phone-field" placeholder="+254712345678" required>
                </div>
                <button type="submit" class="login-btn" style="background: linear-gradient(135deg, #10b981, #059669);">Request Access Code</button>
            </form>

            <form id="otp-input-row" style="display: none;" onsubmit="verifyOTPCode(event);">
                <div class="input-group">
                    <label>Enter 6-Digit SMS Verification Token</label>
                    <input type="text" id="otp-code-field" placeholder="123456" required>
                </div>
                <button type="submit" class="login-btn">Confirm Token & Access</button>
            </form>
        </div>

        <div class="signup-redirect">
            Don't have an account? <a href="signup.html">Sign Up Here</a>
        </div>
    </div>

</body>
</html>
