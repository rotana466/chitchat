<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINCHTECH - Create Account</title>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Your verified configuration credentials
      const firebaseConfig = {
        apiKey: "AIzaSyBzK4tt4gI-B8GAJVXqKpgQD6PTdtuxkbo",
        authDomain: "chat-base-35120.firebaseapp.com",
        projectId: "chat-base-35120",
        storageBucket: "chat-base-35120.firebasestorage.app",
        messagingSenderId: "132736236077",
        appId: "1:132736236077:web:d021488cc88724970ed6a4"
      };

      // Active Connection Initialize
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Dedicated Form Submission Handler
      window.executeRegistration = function(event) {
          event.preventDefault();
          
          const email = document.getElementById("register-email").value.trim();
          const password = document.getElementById("register-password").value;
          const confirmPassword = document.getElementById("confirm-password").value;
          const feedbackDisplay = document.getElementById("status-box");
          
          feedbackDisplay.style.display = "none";
          feedbackDisplay.className = "status-panel";

          // Client side match check
          if (password !== confirmPassword) {
              feedbackDisplay.style.display = "block";
              feedbackDisplay.classList.add("error-theme");
              feedbackDisplay.innerText = "Error: Passwords do not match!";
              return;
          }

          if (password.length < 6) {
              feedbackDisplay.style.display = "block";
              feedbackDisplay.classList.add("error-theme");
              feedbackDisplay.innerText = "Error: Password must be at least 6 characters.";
              return;
          }

          // Direct dynamic transmission to Firebase Database
          createUserWithEmailAndPassword(auth, email, password)
              .then((userCredential) => {
                  feedbackDisplay.style.display = "block";
                  feedbackDisplay.classList.add("success-theme");
                  feedbackDisplay.innerText = "Success! Account registered. Redirecting to login...";
                  
                  document.getElementById("registration-form").reset();
                  
                  // Graceful automated swap back to your login portal after 2 seconds
                  setTimeout(() => {
                      window.location.href = "index.html";
                  }, 2200);
              })
              .catch((firebaseError) => {
                  feedbackDisplay.style.display = "block";
                  feedbackDisplay.classList.add("error-theme");
                  
                  // Clean readable messages for standard errors
                  if (firebaseError.code === "auth/email-already-in-use") {
                      feedbackDisplay.innerText = "This email is already registered.";
                  } else if (firebaseError.code === "auth/invalid-email") {
                      feedbackDisplay.innerText = "Please provide a valid email format.";
                  } else {
                      feedbackDisplay.innerText = firebaseError.message;
                  }
              });
      };
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: #111827;
            width: 100%;
            max-width: 420px;
            padding: 35px 30px;
            border-radius: 14px;
            border: 1px solid #1f2937;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .brand-header h1 {
            font-size: 2.1rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .brand-header p {
            color: #9ca3af;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 6px;
            margin-bottom: 25px;
        }

        .field-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .field-group label {
            display: block;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .field-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .status-panel {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: none;
            line-height: 1.4;
        }

        .error-theme {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .success-theme {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .submit-trigger-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to bottom right, #10b981, #059669);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        .submit-trigger-btn:hover {
            filter: brightness(1.08);
        }

        .submit-trigger-btn:active {
            transform: scale(0.99);
        }

        .footer-navigation {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .footer-navigation a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-navigation a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-header">
            <h1>FINCHTECH</h1>
            <p>Registration Interface Portal</p>
        </div>

        <div id="status-box" class="status-panel"></div>

        <form id="registration-form" onsubmit="executeRegistration(event);">
            <div class="field-group">
                <label for="register-email">Corporate or Personal Email</label>
                <input type="email" id="register-email" placeholder="name@example.com" required autocomplete="email">
            </div>

            <div class="field-group">
                <label for="register-password">Create Security Password</label>
                <input type="password" id="register-password" placeholder="Minimum 6 characters" required autocomplete="new-password">
            </div>

            <div class="field-group">
                <label for="confirm-password">Re-enter Password Verification</label>
                <input type="password" id="confirm-password" placeholder="Repeat security password" required autocomplete="new-password">
            </div>

            <button type="submit" class="submit-trigger-btn">Establish Account</button>
        </form>

        <div class="footer-navigation">
            Already registered? <a href="index.html">Sign In Here</a>
        </div>
    </div>

</body>
</html>
