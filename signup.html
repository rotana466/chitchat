<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINCHTECH - Sign Up</title>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBzK4tt4gI-B8GAJVXqKpgQD6PTdtuxkbo",
        authDomain: "chat-base-35120.firebaseapp.com",
        projectId: "chat-base-35120",
        storageBucket: "chat-base-35120.firebasestorage.app",
        messagingSenderId: "132736236077",
        appId: "1:132736236077:web:d021488cc88724970ed6a4"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      window.handleSignUp = function(event) {
          event.preventDefault();
          
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const confirmPassword = document.getElementById("confirm-password").value;
          const errorMessage = document.getElementById("error-message");
          const successMessage = document.getElementById("success-message");
          
          errorMessage.style.display = "none";
          successMessage.style.display = "none";

          if (password !== confirmPassword) {
              errorMessage.style.display = "block";
              errorMessage.innerText = "Passwords do not match!";
              return;
          }

          createUserWithEmailAndPassword(auth, email, password)
              .then((userCredential) => {
                  successMessage.style.display = "block";
                  successMessage.innerText = "Account created successfully! Go to Login.";
                  document.getElementById("signup-form").reset();
              })
              .catch((error) => {
                  errorMessage.style.display = "block";
                  errorMessage.innerText = error.message;
              });
      };
    </script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .signup-container {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #1f2937;
            text-align: center;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        .success-box {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover { opacity: 0.95; }
        .signup-btn:active { transform: scale(0.98); }

        .login-redirect {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .login-redirect a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .login-redirect a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="brand-logo">FINCHTECH</div>
        <p class="brand-subtitle">Create Digital Portal Account</p>

        <div class="error-box" id="error-message"></div>
        <div class="success-box" id="success-message"></div>

        <form id="signup-form" onsubmit="handleSignUp(event);">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Create username email" required>
            </div>

            <div class="input-group">
                <label for="password">Password (Minimum 6 characters)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div class="login-redirect">
            Already have an account? <a href="index.html">Sign In</a>
        </div>
    </div>

</body>
</html>
